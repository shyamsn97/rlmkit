# Tag-driven release: tests → PyPI (trusted publishing) → Docker image (GHCR).
#
# Trigger:
#   git tag v0.1.0 && git push origin v0.1.0
#
# One-time setup:
#   1. PyPI → Your projects → rlmkit → Publishing → Add a new pending
#      publisher with:
#         owner:       <your-github-user>
#         repository:  rlmkit
#         workflow:    release.yml
#         environment: release
#   2. GitHub → Settings → Environments → New environment "release"
#      (optional: require manual approval on tag push).
#   3. Nothing to do for GHCR — ${{ secrets.GITHUB_TOKEN }} is enough.
#
# If you prefer Docker Hub over GHCR, swap the `login` step for
# `docker/login-action@v3` against `docker.io` with `DOCKERHUB_USERNAME`
# and `DOCKERHUB_TOKEN` repo secrets, and change `IMAGE` below.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to treat as the release version (for re-runs)"
        required: true

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rlmkit
  PYTHON_DEFAULT: "3.12"

jobs:
  test:
    name: test (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  pypi:
    name: publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/rlmkit
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
      - name: Build sdist + wheel
        run: |
          pip install --upgrade build
          python -m build
      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag $TAG != pyproject version $VER"; exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: build and push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Produces: ghcr.io/OWNER/rlmkit:0.1.0, :0.1, :latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
